<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My IB summer study plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF8F4;
    --card:#FFFFFF;
    --ink:#3A362F;
    --ink-soft:#7A7468;
    --line:#EAE5DA;
    --chem:#C98A2B;
    --chem-bg:#FBF1DE;
    --bio:#4F8A63;
    --bio-bg:#E9F3EC;
    --psych:#7C6FC4;
    --psych-bg:#EFEDFA;
    --maths:#3D8FA6;
    --maths-bg:#E7F3F6;
    --practice:#B15C6E;
    --practice-bg:#FBEAEE;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Nunito',sans-serif;}
  .app{max-width:720px;margin:0 auto;padding:1.5rem 1rem 3rem;}
  h1,h2,h3{font-family:'Fredoka',sans-serif;font-weight:600;margin:0;}
  .header{position:relative;padding:1.25rem 1.25rem 1.5rem;background:var(--card);border-radius:20px;border:1px solid var(--line);margin-bottom:1.25rem;overflow:hidden;}
  .tape{position:absolute;top:-10px;left:24px;width:90px;height:26px;background:#F0C46B;opacity:.55;transform:rotate(-4deg);border-radius:2px;}
  .tape.two{left:auto;right:24px;background:#9BD3B4;transform:rotate(5deg);}
  .header h1{font-size:22px;color:var(--ink);}
  .header p.sub{margin:.3rem 0 0;color:var(--ink-soft);font-size:14px;}
  .progress-row{display:flex;align-items:center;gap:12px;margin-top:1rem;}
  .progress-track{flex:1;height:10px;border-radius:6px;background:var(--line);overflow:hidden;}
  .progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--bio),var(--maths));transition:width .3s ease;}
  .progress-label{font-size:13px;font-weight:700;color:var(--ink-soft);min-width:88px;text-align:right;}
  .weeks{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:1rem;}
  .week-btn{flex:0 0 auto;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:var(--card);font-family:'Fredoka',sans-serif;font-size:13px;font-weight:500;color:var(--ink-soft);cursor:pointer;white-space:nowrap;}
  .week-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .week-label{font-size:13px;color:var(--ink-soft);margin:0 0 .6rem 2px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;}
  .days{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:1.5rem;}
  .day-chip{position:relative;border-radius:14px;border:1px solid var(--line);background:var(--card);padding:10px 4px 8px;text-align:center;cursor:pointer;}
  .day-chip.active{border-color:var(--ink);border-width:2px;}
  .day-chip.today{box-shadow:0 0 0 2px #F0C46B inset;}
  .day-chip .dow{font-size:10px;color:var(--ink-soft);text-transform:uppercase;font-weight:700;}
  .day-chip .num{font-family:'Fredoka',sans-serif;font-size:17px;margin-top:2px;}
  .ring{width:20px;height:20px;border-radius:50%;margin:6px auto 0;background:conic-gradient(var(--bio) calc(var(--pct)*1%), var(--line) 0);}
  .ring::after{content:'';display:block;width:12px;height:12px;margin:4px auto;border-radius:50%;background:var(--card);}
  .day-detail{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:1.25rem;position:relative;overflow:hidden;}
  .day-detail .tape{top:-10px;left:50%;transform:translateX(-50%) rotate(-2deg);background:#D9C7F0;opacity:.6;}
  .day-title{font-size:19px;margin-bottom:2px;}
  .day-sub{color:var(--ink-soft);font-size:13px;margin-bottom:1.1rem;}
  .block{border-radius:14px;padding:12px 14px;margin-bottom:12px;border:1px solid var(--line);}
  .block-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .block-title{font-family:'Fredoka',sans-serif;font-size:14px;font-weight:500;}
  .block-topic{font-size:13px;color:var(--ink-soft);margin-left:17px;margin-top:-4px;margin-bottom:8px;}
  .task{position:relative;display:flex;align-items:flex-start;gap:10px;padding:7px 4px;font-size:14px;cursor:pointer;border-radius:10px;transition:background .15s ease;}
  .task:hover{background:rgba(0,0,0,.03);}
  .task input{position:absolute;opacity:0;width:22px;height:22px;top:6px;left:4px;margin:0;cursor:pointer;}
  .box{width:22px;height:22px;border-radius:8px;border:2px solid var(--ink-soft);flex:0 0 auto;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:transform .18s cubic-bezier(.34,1.56,.64,1),background .15s ease,border-color .15s ease;position:relative;}
  .box::after{content:'✓';font-size:13px;font-weight:700;color:#fff;opacity:0;transform:scale(.5);transition:opacity .12s ease,transform .12s ease;}
  .task input:checked + .box{background:var(--ink);border-color:var(--ink);}
  .task input:checked + .box::after{opacity:1;transform:scale(1);}
  .task.pop .box{transform:scale(1.22);}
  .task-body{flex:1;min-width:0;}
  .task-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:2px;}
  .tag{font-size:10px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;padding:2px 7px;border-radius:999px;background:rgba(0,0,0,.06);color:var(--ink-soft);}
  .time-chip{font-size:10px;font-weight:700;color:var(--ink-soft);padding:2px 6px;}
  .task span.txt{line-height:1.4;}
  .task.done span.txt{text-decoration:line-through;color:var(--ink-soft);}
  .chem-b{background:var(--chem-bg);} .chem-b .dot{background:var(--chem);} .chem-b .block-title{color:#7A5518;} .chem-b .box{border-color:var(--chem);} .chem-b .task input:checked + .box{background:var(--chem);border-color:var(--chem);}
  .bio-b{background:var(--bio-bg);} .bio-b .dot{background:var(--bio);} .bio-b .block-title{color:#2E5C3E;} .bio-b .box{border-color:var(--bio);} .bio-b .task input:checked + .box{background:var(--bio);border-color:var(--bio);}
  .psych-b{background:var(--psych-bg);} .psych-b .dot{background:var(--psych);} .psych-b .block-title{color:#4C4088;} .psych-b .box{border-color:var(--psych);} .psych-b .task input:checked + .box{background:var(--psych);border-color:var(--psych);}
  .maths-b{background:var(--maths-bg);} .maths-b .dot{background:var(--maths);} .maths-b .block-title{color:#245A69;} .maths-b .box{border-color:var(--maths);} .maths-b .task input:checked + .box{background:var(--maths);border-color:var(--maths);}
  .practice-b{background:var(--practice-bg);} .practice-b .dot{background:var(--practice);} .practice-b .block-title{color:#7C3D4A;} .practice-b .box{border-color:var(--practice);} .practice-b .task input:checked + .box{background:var(--practice);border-color:var(--practice);}
  .block-time{font-size:11px;color:var(--ink-soft);font-weight:700;margin-left:auto;}
  .complete-badge{display:inline-flex;align-items:center;gap:6px;background:var(--bio-bg);color:#2E5C3E;font-family:'Fredoka',sans-serif;font-size:13px;font-weight:600;padding:7px 14px;border-radius:999px;margin-top:4px;margin-bottom:2px;animation:badge-pop .35s cubic-bezier(.34,1.56,.64,1);}
  @keyframes badge-pop{0%{transform:scale(.6);opacity:0;}70%{transform:scale(1.08);opacity:1;}100%{transform:scale(1);}}
  .nav-btns{display:flex;justify-content:space-between;margin-top:1rem;}
  .nav-btns button{font-family:'Fredoka',sans-serif;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 16px;font-size:13px;cursor:pointer;color:var(--ink);}
  .nav-btns button:disabled{opacity:.35;cursor:default;}
  .streak-row{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .streak-badge{display:inline-flex;align-items:center;gap:5px;background:#FDEFDA;color:#8A5A1F;font-family:'Fredoka',sans-serif;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;}
  .day-ring-big{width:52px;height:52px;border-radius:50%;background:conic-gradient(var(--bio) calc(var(--pct-big)*1%), var(--line) 0);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .day-ring-big::after{content:attr(data-pct)'%';display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:var(--card);font-family:'Fredoka',sans-serif;font-size:12px;font-weight:600;color:var(--ink);}
  .day-detail-head{display:flex;align-items:center;gap:14px;margin-bottom:1.1rem;}
  .confetti-piece{position:absolute;top:-10px;width:8px;height:8px;border-radius:2px;pointer-events:none;animation:confetti-fall 1.1s ease-out forwards;z-index:50;}
  @keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(220px) rotate(540deg);opacity:0;}}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);font-family:'Fredoka',sans-serif;font-size:13px;font-weight:500;padding:11px 20px;border-radius:999px;opacity:0;transition:opacity .25s ease,transform .25s ease;pointer-events:none;z-index:100;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media(max-width:480px){.days{grid-template-columns:repeat(6,1fr);gap:5px;} .day-chip{padding:6px 2px;} .day-chip .num{font-size:14px;}}
</style>
</head>

DAYS.forEach((day,i)=>{ day.id = i+1; });

let currentWeek = 1;
let currentDayId = 1;
let progress = {};

async function loadProgress(){
  try{
    const raw = localStorage.getItem('ib-progress-data');
    progress = raw ? JSON.parse(raw) : {};
  }catch(e){ progress = {}; }
}
async function saveProgress(){
  try{ localStorage.setItem('ib-progress-data', JSON.stringify(progress)); }catch(e){}
}

function taskKey(dayId, blockIdx, taskIdx){ return dayId+'-'+blockIdx+'-'+taskIdx; }

function resourceTag(text){
  const t = text.toLowerCase();
  if(t.includes('flashcard')) return 'Flashcards';
  if(t.includes('jojo ai chat')) return 'Jojo AI Chat';
  if(t.includes('exam mode') || t.includes('test builder')) return 'Exam Mode';
  if(t.includes('questionbank') || t.includes('question') || t.includes('drill') || t.includes('mock') || t.includes('paper') || t.includes('quiz')) return 'Questionbank';
  if(t.includes('mark with jojo ai') || t.includes('jojo ai') || t.includes('mark ')) return 'Jojo AI';
  if(t.includes('read dojo') || t.includes('notes')) return 'Notes';
  if(t.includes('error doc')) return 'Error doc';
  return 'Active recall';
}

function estimateTime(text){
  const t = text.toLowerCase();
  if(t.includes('mock') || t.includes('full paper') || t.includes('exam mode')) return 45;
  if(t.includes('20-question') || t.includes('30-question')) return 35;
  if(t.includes('notes')) return 15;
  if(t.includes('flashcard')) return 8;
  if(t.includes('mark with jojo ai') || t.includes('jojo ai chat')) return 8;
  if(t.includes('question') || t.includes('drill') || t.includes('quiz')) return 15;
  if(t.includes('draw') || t.includes('sketch') || t.includes('write') || t.includes('practise') || t.includes('practice')) return 12;
  return 10;
}

function blockTime(block){
  return block.tasks.reduce((sum,t)=>sum+estimateTime(t),0);
}

function fireConfetti(container){
  const colors = ['#C98A2B','#4F8A63','#7C6FC4','#3D8FA6','#B15C6E'];
  for(let i=0;i<22;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = (Math.random()*100)+'%';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = (Math.random()*0.15)+'s';
    container.appendChild(p);
    setTimeout(()=>p.remove(), 1400);
  }
}

let toastTimer = null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2600);
}

function currentStreak(){
  let streak = 0;
  for(const day of DAYS){
    if(dayPct(day)===100) streak++;
    else break;
  }
  return streak;
}

function tasksDoneCount(){
  return Object.values(progress).filter(Boolean).length;
}

function dayPct(day){
  let total=0, done=0;
  day.blocks.forEach((b,bi)=>{ b.tasks.forEach((t,ti)=>{ total++; if(progress[taskKey(day.id,bi,ti)]) done++; }); });
  return total? Math.round(done/total*100) : 0;
}

function overallPct(){
  let total=0, done=0;
  DAYS.forEach(day=>{ day.blocks.forEach((b,bi)=>{ b.tasks.forEach((t,ti)=>{ total++; if(progress[taskKey(day.id,bi,ti)]) done++; }); }); });
  return total? Math.round(done/total*100) : 0;
}

function todayId(){
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), dd = now.getDate();
  for(const day of DAYS){
    const parts = day.date.split(' ');
    const dn = parseInt(parts[0],10);
    const mon = parts[1]==='Jul' ? 6 : 7;
    if(y===2026 && m===mon && dd===dn) return day.id;
  }
  return null;
}

function renderWeeks(){
  const el = document.getElementById('weeks');
  el.innerHTML='';
  for(let w=1; w<=6; w++){
    const btn = document.createElement('button');
    btn.className = 'week-btn'+(w===currentWeek?' active':'');
    btn.textContent = 'Week '+w;
    btn.onclick = ()=>{ currentWeek=w; const first = DAYS.find(dd=>dd.week===w); currentDayId=first.id; renderAll(); };
    el.appendChild(btn);
  }
}

function renderDays(){
  document.getElementById('week-label').textContent = WEEK_LABELS[currentWeek-1];
  const el = document.getElementById('days');
  el.innerHTML='';
  const tId = todayId();
  DAYS.filter(dd=>dd.week===currentWeek).forEach(day=>{
    const chip = document.createElement('div');
    chip.className = 'day-chip'+(day.id===currentDayId?' active':'')+(day.id===tId?' today':'');
    const pct = dayPct(day);
    chip.innerHTML = '<div class="dow">'+day.dow+'</div><div class="num">'+day.date.split(' ')[0]+'</div><div class="ring" style="--pct:'+pct+'"></div>';
    chip.onclick = ()=>{ currentDayId = day.id; renderAll(); };
    el.appendChild(chip);
  });
}

function renderDetail(){
  const day = DAYS.find(dd=>dd.id===currentDayId);
  const el = document.getElementById('day-detail');
  const pct = dayPct(day);
  const totalMin = day.blocks.reduce((s,b)=>s+blockTime(b),0);
  const hrs = Math.floor(totalMin/60), mins = totalMin%60;
  const timeLabel = (hrs?hrs+'h ':'')+mins+'m';
  let html = '<div class="tape"></div>';
  html += '<div class="day-detail-head">';
  html += '<div class="day-ring-big" style="--pct-big:'+pct+'" data-pct="'+pct+'"></div>';
  html += '<div><h2 class="day-title">'+day.dow+' '+day.date+'</h2>';
  html += '<p class="day-sub">Day '+day.id+' of 36 · '+WEEK_LABELS[day.week-1]+' · ~'+timeLabel+' today</p></div>';
  html += '</div>';
  if(pct===100){ html += '<div class="complete-badge">🎉 Day complete — nice work</div>'; }
  day.blocks.forEach((b,bi)=>{
    const meta = SUBJECT_META[b.subject];
    html += '<div class="block '+meta.cls+'">';
    html += '<div class="block-head"><span class="dot"></span><span class="block-title">'+meta.icon+' '+meta.label+'</span><span class="block-time">~'+blockTime(b)+' min</span></div>';
    html += '<div class="block-topic">'+b.topic+'</div>';
    b.tasks.forEach((t,ti)=>{
      const key = taskKey(day.id,bi,ti);
      const checked = !!progress[key];
      html += '<label class="task'+(checked?' done':'')+'" data-key="'+key+'"><input type="checkbox" '+(checked?'checked':'')+' /><span class="box"></span><span class="task-body"><span class="task-meta"><span class="tag">'+resourceTag(t)+'</span><span class="time-chip">~'+estimateTime(t)+'m</span></span><span class="txt">'+t+'</span></span></label>';
    });
    html += '</div>';
  });
  html += '<div class="nav-btns"><button id="prev-btn">&larr; Previous day</button><button id="next-btn">Next day &rarr;</button></div>';
  el.innerHTML = html;

  el.querySelectorAll('.task input').forEach(input=>{
    input.addEventListener('change', async (e)=>{
      const label = e.target.closest('.task');
      const key = label.dataset.key;
      progress[key] = e.target.checked;
      label.classList.add('pop');
      setTimeout(()=>label.classList.remove('pop'), 200);
      const wasComplete = dayPct(day)===100;
      await saveProgress();
      const nowComplete = dayPct(day)===100;
      if(e.target.checked && nowComplete && !wasComplete){
        fireConfetti(el);
      }
      renderAll();
    });
  });
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  prevBtn.disabled = day.id===1;
  nextBtn.disabled = day.id===36;
  prevBtn.onclick = ()=>{ if(day.id>1){ currentDayId=day.id-1; currentWeek=DAYS.find(dd=>dd.id===currentDayId).week; renderAll(); } };
  nextBtn.onclick = ()=>{ if(day.id<36){ currentDayId=day.id+1; currentWeek=DAYS.find(dd=>dd.id===currentDayId).week; renderAll(); } };
}

  {pct:25, msg:'✨ 25% done — momentum is building'},
  {pct:50, msg:'✨ Halfway there!'},
  {pct:75, msg:'✨ 75% — home stretch'},
  {pct:100, msg:'🎉 Whole plan complete!'}
];
function renderOverall(){
  const pct = overallPct();
  document.getElementById('overall-fill').style.width = pct+'%';
  document.getElementById('overall-label').textContent = pct+'% done';
  const streak = currentStreak();
  document.getElementById('streak-badge').textContent = '🔥 '+streak+'-day streak';
  document.getElementById('tasks-badge').textContent = '✅ '+tasksDoneCount()+' tasks done';
  MILESTONES.forEach(m=>{ if(pct>=m.pct && prevOverallPct<m.pct){ showToast(m.msg); } });
  prevOverallPct = pct;
}

function renderAll(){
  renderWeeks();
  renderDays();
  renderDetail();
  renderOverall();
}

(async function init(){
  await loadProgress();
  prevOverallPct = overallPct();
  const tId = todayId();
  if(tId){ currentDayId = tId; currentWeek = DAYS.find(dd=>dd.id===tId).week; }
  renderAll();
})();
</script>
</body>
</html>
